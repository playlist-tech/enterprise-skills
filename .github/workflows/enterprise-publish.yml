name: Publish Enterprise

on:
  push:
    tags:
      - 'v*-enterprise.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        id: publish
        run: npm publish --provenance --access public --tag enterprise

      - name: Tag as latest
        if: steps.publish.outcome == 'success' || steps.publish.outcome == 'failure'
        run: npm dist-tag add @playlist-tech/enterprise-skills@$(node -p "require('./package.json').version") latest || true

      - name: Create GitHub Release
        if: steps.publish.outcome == 'success'
        run: |
          VERSION=$(node -p "require('./package.json').version")

          # Get changelog from merged PRs since last enterprise tag
          LATEST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            SINCE=""
          else
            SINCE=$(git log -1 --format=%cI ${LATEST_TAG})
          fi

          if [ -z "$SINCE" ]; then
            PRS=$(gh pr list --state merged --json number,title,author --limit 100)
          else
            PRS=$(gh pr list --state merged --search "merged:>=${SINCE}" --json number,title,author --limit 100)
          fi

          CHANGELOG=$(echo "$PRS" | jq -r '.[] | "- \(.title) (#\(.number))"')
          CONTRIBUTORS=$(echo "$PRS" | jq -r '.[].author.login' | sort -u | sed 's/^/@/' | paste -sd ', ' -)

          export VERSION CHANGELOG CONTRIBUTORS
          envsubst < .github/RELEASE_TEMPLATE.md > release-notes.md

          gh release create "v${VERSION}" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
